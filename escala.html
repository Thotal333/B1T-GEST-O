    --s-ok:#1f8a52; --s-ok-w:#e6f5ec;
    --s-back:#c93b4b; --s-back-w:#fdecee;
    --radius:11px;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    font-size:14px; line-height:1.45; -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:"SFMono-Regular",ui-monospace,"Cascadia Code",Consolas,monospace;
    font-variant-numeric:tabular-nums; letter-spacing:-.02em}
  .app{display:grid; grid-template-columns:248px 1fr; min-height:100vh}

  /* ---------- SIDEBAR ---------- */
  .side{background:var(--ink); color:#cfd4e0; display:flex; flex-direction:column;
    padding:18px 14px; gap:6px; position:sticky; top:0; height:100vh}
  .brand{display:flex; align-items:center; gap:9px; padding:4px 8px 14px; margin-bottom:4px;
    border-bottom:1px solid #262c3b}
  .logo{width:34px;height:34px;border-radius:8px;background:#fff;display:grid;place-items:center;padding:3px}
  .logo img{width:100%;height:100%;object-fit:contain;display:block}
  .brand b{color:#fff;font-size:15px;letter-spacing:-.01em}
  .brand span{display:block;font-size:11px;color:#7c8598;font-weight:500;margin-top:-2px}

  .role-box{background:var(--ink-2);border:1px solid #2b3243;border-radius:9px;
    padding:10px;margin:8px 0 6px}
  .role-box .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:#6f7891;margin-bottom:7px;font-weight:600}
  .roles{display:grid;grid-template-columns:1fr;gap:4px}
  .role-btn{display:flex;align-items:center;gap:8px;background:transparent;border:1px solid transparent;
    color:#aeb6c8;padding:7px 9px;border-radius:7px;font-size:12.5px;cursor:pointer;text-align:left;
    font-family:inherit;transition:.12s}
  .role-btn:hover{background:#232a3a;color:#e6e9f1}
  .role-btn.on{background:var(--primary);color:#fff;font-weight:600}
  .role-btn .dot{width:7px;height:7px;border-radius:50%;background:currentColor;opacity:.7}

  .nav{display:flex;flex-direction:column;gap:2px;margin-top:6px}
  .nav .grp{font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:#5c6478;
    padding:12px 9px 5px;font-weight:700}
  .nav a{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;
    color:#b7bfd0;text-decoration:none;font-size:13px;cursor:pointer;transition:.12s}
  .nav a:hover{background:#232a3a;color:#fff}
  .nav a.on{background:#2a3350;color:#fff;font-weight:600}
  .nav a .ic{width:16px;text-align:center;opacity:.85}
  .side-foot{margin-top:auto;padding-top:12px;border-top:1px solid #262c3b;font-size:11px;color:#697187}
  .side-foot b{color:#aeb6c8;font-weight:600}

  /* ---------- MAIN ---------- */
  .main{padding:0;min-width:0}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;
    padding:16px 30px;border-bottom:1px solid var(--line);background:var(--card);
    position:sticky;top:0;z-index:5}
  .topbar h1{margin:0;font-size:17px;font-weight:700;letter-spacing:-.01em}
  .topbar .sub{font-size:12.5px;color:var(--slate);margin-top:1px}
  .who{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--slate)}
  .who .av{width:30px;height:30px;border-radius:50%;background:var(--primary-wash);color:var(--primary-ink);
    display:grid;place-items:center;font-weight:700;font-size:12px}
  .content{padding:26px 30px 60px;max-width:1180px}
  .screen{display:none;animation:fade .18s ease}
  .screen.on{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  /* ---------- primitives ---------- */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius)}
  .card-pad{padding:18px 20px}
  .row{display:flex;align-items:center;gap:12px}
  .between{justify-content:space-between}
  .muted{color:var(--slate)}
  .h2{font-size:15px;font-weight:700;margin:0 0 3px}
  .lead{color:var(--slate);font-size:13px;margin:0 0 18px}
  .btn{border:1px solid var(--line);background:var(--card);color:var(--ink);padding:8px 14px;border-radius:8px;
    font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:.12s;display:inline-flex;align-items:center;gap:7px}
  .btn:hover{border-color:#cfd4e0;background:#fafbfd}
  .btn.pri{background:var(--primary);border-color:var(--primary);color:#fff}
  .btn.pri:hover{background:var(--primary-ink)}
  .btn.ghost{border-color:transparent;background:transparent;color:var(--primary-ink)}
  .btn.sm{padding:5px 10px;font-size:12px}
  .btn.danger{color:var(--s-back);border-color:#f3d3d7}
  .btn.danger:hover{background:var(--s-back-w)}

  .pill{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:20px;
    font-size:11.5px;font-weight:600;white-space:nowrap}
  .pill .d{width:6px;height:6px;border-radius:50%;background:currentColor}
  .p-none{color:var(--s-none);background:var(--s-none-w)}
  .p-open{color:var(--s-open);background:var(--s-open-w)}
  .p-draft{color:var(--s-draft);background:var(--s-draft-w)}
  .p-sent{color:var(--s-sent);background:var(--s-sent-w)}
  .p-ok{color:var(--s-ok);background:var(--s-ok-w)}
  .p-back{color:var(--s-back);background:var(--s-back-w)}

  .stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:22px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px}
  .stat .n{font-size:23px;font-weight:800;letter-spacing:-.02em}
  .stat .l{font-size:12px;color:var(--slate);margin-top:2px}
  .stat .n.g{color:var(--s-ok)} .stat .n.a{color:var(--s-draft)} .stat .n.v{color:var(--s-sent)} .stat .n.r{color:var(--s-back)}

  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--slate-2);
    font-weight:700;padding:10px 12px;border-bottom:1px solid var(--line)}
  td{padding:11px 12px;border-bottom:1px solid var(--line-2);font-size:13px;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  .t-name{font-weight:600}
  .t-mat{font-size:12px;color:var(--slate)}

  /* ---------- GRID DE ESCALA ---------- */
  .grid-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);background:var(--card)}
  table.grid{min-width:820px}
  table.grid th{padding:11px 10px;text-align:center;background:#f9fafc}
  table.grid th.func{text-align:left;position:sticky;left:0;background:#f9fafc;z-index:2;min-width:210px}
  table.grid th.wknd{color:var(--s-back)}
  table.grid td{padding:6px;border-bottom:1px solid var(--line-2);text-align:center}
  table.grid td.func{text-align:left;position:sticky;left:0;background:var(--card);z-index:1;
    border-right:1px solid var(--line)}
  .cell{border:1px solid var(--line);border-radius:7px;padding:5px 4px;min-width:78px;cursor:pointer;
    background:var(--card);transition:.1s;font-size:11.5px}
  .cell:hover{border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-wash)}
  .cell .t{font-weight:700;font-size:12px}
  .cell .t2{color:var(--slate);font-size:10.5px}
  .cell.turno{background:#f3f6ff;border-color:#dbe4fe}
  .cell.turno .t{color:var(--primary-ink)}
  .cell.folga{background:var(--s-none-w);border-color:#e2e6ee}.cell.folga .t{color:var(--slate)}
  .cell.ferias{background:#eaf6fb;border-color:#cfe8f2}.cell.ferias .t{color:#1b7fa8}
  .cell.atest{background:#fbf1df;border-color:#f0dcb4}.cell.atest .t{color:var(--s-draft)}
  .cell.falta{background:var(--s-back-w);border-color:#f3d3d7}.cell.falta .t{color:var(--s-back)}
  .cell.custom{background:#f1ecfc;border-color:#e0d4f5}.cell.custom .t{color:var(--s-sent)}
  .cell.empty{color:var(--slate-2);border-style:dashed}

  .banner{border-radius:var(--radius);padding:13px 16px;margin-bottom:18px;font-size:13px;display:flex;gap:11px;align-items:flex-start}
  .banner.back{background:var(--s-back-w);border:1px solid #f3d3d7;color:#7d2531}
  .banner.open{background:var(--s-open-w);border:1px solid #cfe0fb;color:#1f4a9e}
  .banner.ok{background:var(--s-ok-w);border:1px solid #c7e8d3;color:#166b41}
  .banner b{font-weight:700}
  .banner .bic{font-size:16px;line-height:1.2}

  .toolbar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:16px;flex-wrap:wrap}
  .wk{display:inline-flex;align-items:center;gap:2px;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .wk button{border:none;background:var(--card);padding:8px 11px;cursor:pointer;font-size:14px;color:var(--slate)}
  .wk button:hover{background:#f4f6fa}
  .wk .cur{padding:8px 14px;font-weight:700;font-size:13px;border-left:1px solid var(--line);border-right:1px solid var(--line)}

  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:var(--slate);margin-top:12px}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .legend i{width:11px;height:11px;border-radius:3px;display:inline-block}

  /* chips / team */
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{display:inline-flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);
    border-radius:9px;padding:8px 10px 8px 12px;font-size:13px}
  .chip .x{cursor:pointer;color:var(--slate-2);border:none;background:none;font-size:15px;line-height:1;padding:0 2px}
  .chip .x:hover{color:var(--s-back)}
  .chip .mat{font-size:11px;color:var(--slate)}
  .search{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:9px;padding:8px 12px;background:var(--card);max-width:340px}
  .search input{border:none;outline:none;font-size:13px;width:100%;font-family:inherit}

  .drop{position:relative}
  .drop-list{border:1px solid var(--line);border-radius:9px;margin-top:8px;max-height:220px;overflow:auto;background:var(--card)}
  .drop-list div{padding:9px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--line-2);display:flex;justify-content:space-between}
  .drop-list div:hover{background:var(--primary-wash)}

  .upload{border:2px dashed #cdd4e2;border-radius:var(--radius);padding:30px;text-align:center;color:var(--slate);background:#fafbfe;cursor:pointer}
  .upload:hover{border-color:var(--primary);color:var(--primary-ink);background:var(--primary-wash)}
  .upload .big{font-size:30px;margin-bottom:6px}

  .div-ok{color:var(--s-ok);font-weight:600}
  .div-bad{color:var(--s-back);font-weight:600}
  .div-warn{color:var(--s-draft);font-weight:600}

  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:560px}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--ink-2);margin-bottom:5px}
  .field input,.field select{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-size:13px;font-family:inherit;outline:none}
  .field input:focus,.field select:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-wash)}
  .full{grid-column:1/-1}
  .checks{display:flex;flex-wrap:wrap;gap:8px}
  .checks label{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer}
  .checks label.sel{background:var(--primary-wash);border-color:#c3cffb;color:var(--primary-ink);font-weight:600}

  .note{font-size:12px;color:var(--slate-2);margin-top:10px}
  @media(max-width:820px){.app{grid-template-columns:1fr}.side{display:none}.content{padding:18px}.form-grid{grid-template-columns:1fr}}

  /* editor de célula */
  .cell.clickable{cursor:pointer}
  .ov{position:fixed;inset:0;background:rgba(18,22,31,.42);display:flex;align-items:center;justify-content:center;z-index:50;animation:fade .15s ease}
  .modal{background:var(--card);border-radius:14px;width:380px;max-width:92vw;box-shadow:0 20px 60px rgba(18,22,31,.28);overflow:hidden}
  .modal .mh{padding:16px 18px 12px;border-bottom:1px solid var(--line)}
  .modal .mh .t{font-weight:700;font-size:14px}
  .modal .mh .s{font-size:12px;color:var(--slate);margin-top:2px}
  .modal .mb{padding:14px 18px;max-height:56vh;overflow:auto}
  .modal .sec{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--slate-2);font-weight:700;margin:4px 0 8px}
  .opt{display:flex;align-items:center;justify-content:space-between;gap:10px;border:1px solid var(--line);border-radius:9px;padding:9px 12px;margin-bottom:7px;cursor:pointer;transition:.1s}
  .opt:hover{border-color:var(--primary);background:var(--primary-wash)}
  .opt.sel{border-color:var(--primary);background:var(--primary-wash)}
  .opt .on{font-weight:600;font-size:13px} .opt .os{font-size:12px;color:var(--slate)}
  .opt.st .dotc{width:9px;height:9px;border-radius:3px;display:inline-block;margin-right:8px;vertical-align:-1px}
  .cust{display:flex;gap:8px;align-items:center;margin-top:4px}
  .cust input{border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;width:100%;outline:none}
  .cust input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-wash)}
  .modal .mf{padding:12px 18px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px}
  .wkall{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--slate);cursor:pointer;user-select:none}
  .wkall input{width:15px;height:15px;accent-color:var(--primary)}
</style>

    if(item.grp){const g=document.createElement('div');g.className='grp';g.textContent=item.grp;nav.appendChild(g);return}
    const a=document.createElement('a'); a.dataset.id=item.id;
    a.className=(item.id===screen?'on':''); a.innerHTML=`<span class="ic">${item.ic}</span>${item.t}`;
    a.onclick=()=>{screen=item.id; buildNav(); render()};
    nav.appendChild(a);
  });
}

function render(){
  const who=WHO[role];
  document.getElementById('whoTxt').textContent=who.txt;
  document.getElementById('whoAv').textContent=who.av;
  const c=document.getElementById('content');
  const fn = SCREENS[screen] || (()=>'<div class="muted">—</div>');
  const {title,sub,html}=fn();
  document.getElementById('pageTitle').textContent=title;
  document.getElementById('pageSub').textContent=sub||who.sub;
  c.innerHTML=`<div class="screen on">${html}</div>`;
}

function weekbar(){
  return `<div class="wk"><button>‹</button><span class="cur">14/07 – 20/07 · 2026</span><button>›</button></div>`;
}
function gridHead(){
  return `<tr><th class="func">Funcionário</th>`+
    DIAS.map(d=>`<th class="${d.wk?'wknd':''}">${d.d}<br><span class="mono" style="font-weight:400;color:var(--slate)">${d.n}</span></th>`).join('')+`</tr>`;
}
function cellHtml(c, r, d, editable){
  const m=cellView(c);
  const click = editable ? `onclick="openCell(${r},${d})"` : '';
  const ed = editable ? ' clickable' : '';
  return `<td><div class="cell ${m.cls}${ed}" ${click}><div class="t">${m.t}</div>${m.t2?`<div class="t2">${m.t2}</div>`:''}</div></td>`;
}
function gridBody(editable){
  return EQUIPE.map((f,i)=>`<tr>
    <td class="func"><div class="t-name">${f.nome}</div><div class="t-mat mono">mat. ${f.mat}</div></td>
    ${ESCALA[i].map((c,d)=>cellHtml(c,i,d,editable)).join('')}
  </tr>`).join('');
}
function legend(){
  return `<div class="legend">
    <span><i style="background:#dbe4fe"></i> Turno</span>
    <span><i style="background:#e2e6ee"></i> Folga</span>
    <span><i style="background:#cfe8f2"></i> Férias</span>
    <span><i style="background:#f0dcb4"></i> Atestado</span>
    <span><i style="background:#f3d3d7"></i> Falta</span>
    <span><i style="background:#e0d4f5"></i> Personalizado</span>
  </div>`;
}

/* ---------------- TELAS ---------------- */
const SCREENS = {
  /* ---- LOJA ---- */
  preencher(){
    return {title:'Preencher escala', sub:WHO.loja.sub, html:`
      <div class="banner back"><span class="bic">↩</span><div>
        <b>Escala devolvida pelo supervisor.</b> "Vandelei está com folga no sábado, mas é dia de movimento — reveja. E confirme se a Anna entra em férias mesmo nesta semana." — Ajuste e reenvie.
      </div></div>
      <div class="toolbar">
        ${weekbar()}
        <div class="row">
          <button class="btn">Salvar rascunho</button>
          <button class="btn pri">Enviar para aprovação</button>
        </div>
      </div>
      <div class="grid-wrap"><table class="grid"><thead>${gridHead()}</thead><tbody>${gridBody(true)}</tbody></table></div>
      ${legend()}
      <p class="note">Clique em qualquer célula para escolher um turno cadastrado, um status (folga, férias, atestado, falta) ou digitar um horário personalizado.</p>
    `};
  },
  equipe(){
    const chips = EQUIPE.map(f=>`<div class="chip"><div><div>${f.nome}</div><div class="mat mono">mat. ${f.mat}</div></div><button class="x">×</button></div>`).join('');
    const disp = DISPONIVEIS.map(f=>`<div><span>${f.nome} <span class="mono muted">· ${f.mat}</span></span><span class="btn ghost sm">+ Adicionar</span></div>`).join('');
    return {title:'Minha equipe', sub:'Loja WT MORU · 5 funcionários', html:`
      <p class="lead">Monte a equipe da sua loja. Ao salvar, ela fica pronta pras próximas semanas — você só ajusta quando alguém entra ou sai.</p>
      <div class="card card-pad" style="margin-bottom:16px">
        <div class="row between" style="margin-bottom:14px"><div class="h2">Equipe atual</div><div class="muted">5 selecionados</div></div>
        <div class="chips">${chips}</div>
      </div>
      <div class="card card-pad">
        <div class="h2" style="margin-bottom:4px">Adicionar funcionário</div>
        <p class="muted" style="font-size:12.5px;margin:0 0 12px">Funcionários vinculados à WT MORU que ainda não estão na equipe.</p>
        <div class="search">🔍 <input placeholder="Buscar por nome ou matrícula…"></div>
        <div class="drop-list" style="margin-top:12px">${disp}</div>
      </div>
      <div class="row" style="margin-top:18px;justify-content:flex-end;gap:10px">
        <button class="btn">Cancelar</button><button class="btn pri">Salvar equipe</button>
      </div>
    `};
  },
  historico(){
    const rows=[
      {sem:'14/07 – 20/07', st:'sent', quando:'Enviada hoje, 09:12'},
      {sem:'07/07 – 13/07', st:'ok', quando:'Aprovada em 05/07'},
      {sem:'30/06 – 06/07', st:'ok', quando:'Aprovada em 28/06'},
      {sem:'23/06 – 29/06', st:'back', quando:'Devolvida em 21/06'},
    ];
    return {title:'Minhas escalas', sub:'Loja WT MORU · histórico', html:`
      <p class="lead">Acompanhe as escalas que você já enviou e o status de cada uma.</p>
      <div class="card"><table>
        <thead><tr><th>Semana</th><th>Status</th><th>Atualização</th><th></th></tr></thead>
        <tbody>${rows.map(r=>`<tr><td class="t-name">${r.sem}</td><td>${pill(r.st)}</td><td class="muted">${r.quando}</td><td style="text-align:right"><button class="btn sm">Abrir</button></td></tr>`).join('')}</tbody>
      </table></div>
    `};
  },

  /* ---- SUPERVISOR ---- */
  painel(){
    const count=(s)=>LOJAS.filter(l=>l.st===s).length;
    const cards = LOJAS.map(l=>`<tr>
      <td class="t-name mono">${l.cod}</td>
      <td>${pill(l.st)}</td>
      <td class="muted">${l.st==='sent'?'Enviada há 2h':l.st==='ok'?'Aprovada':l.st==='draft'?'Em preenchimento':l.st==='back'?'Devolvida ontem':l.st==='open'?'Aguardando loja':'—'}</td>
      <td style="text-align:right">${(l.st==='sent')?'<button class="btn pri sm" onclick="go(\'aprovar\')">Revisar</button>':'<button class="btn sm">Ver</button>'}</td>
    </tr>`).join('');
    return {title:'Escalas das lojas', sub:'Semana de 14/07 a 20/07 · visão geral', html:`
      <div class="stat-row">
        <div class="stat"><div class="n v">${count('sent')}</div><div class="l">Aguardando aprovação</div></div>
        <div class="stat"><div class="n g">${count('ok')}</div><div class="l">Aprovadas</div></div>
        <div class="stat"><div class="n a">${count('draft')}</div><div class="l">Em rascunho</div></div>
        <div class="stat"><div class="n r">${count('back')}</div><div class="l">Devolvidas</div></div>
        <div class="stat"><div class="n">${count('open')}</div><div class="l">A preencher</div></div>
      </div>
      <div class="card"><table>
        <thead><tr><th>Loja</th><th>Status</th><th>Situação</th><th></th></tr></thead>
        <tbody>${cards}</tbody>
      </table></div>
      <p class="note">As lojas "Não liberadas" ficam ocultas nesta visão da semana. A liberação é feita pela Conferência.</p>
    `};
  },
  aprovar(){
    return {title:'Revisar escala — WT MORU', sub:'Enviada hoje, 09:12 · aguardando aprovação', html:`
      <div class="banner open"><span class="bic">◷</span><div><b>Aguardando sua aprovação.</b> Confira a grade abaixo. Você pode aprovar ou devolver com um comentário pra loja corrigir.</div></div>
      <div class="grid-wrap" style="margin-bottom:18px"><table class="grid"><thead>${gridHead()}</thead><tbody>${gridBody(false)}</tbody></table></div>
      ${legend()}
      <div class="card card-pad" style="margin-top:20px">
        <div class="h2" style="margin-bottom:8px">Decisão</div>
        <div class="field full"><label>Comentário (obrigatório ao devolver)</label>
          <input placeholder="Ex.: Rever a folga do Vanderlei no sábado…"></div>
        <div class="row" style="justify-content:flex-end;gap:10px;margin-top:16px">
          <button class="btn danger">Devolver para correção</button>
          <button class="btn pri">Aprovar escala</button>
        </div>
      </div>
    `};
  },

  /* ---- CONFERÊNCIA ---- */
  liberar(){
    const rows = LOJAS.map(l=>`<tr>
      <td class="t-name mono">${l.cod}</td>
      <td>${pill(l.st)}</td>
      <td style="text-align:right">
        ${l.st==='none'
          ? '<button class="btn pri sm">Liberar preenchimento</button>'
          : '<span class="muted" style="font-size:12px">Liberada</span> <button class="btn sm">Revogar</button>'}
      </td>
    </tr>`).join('');
    return {title:'Liberar semana', sub:'Semana de 14/07 a 20/07 · abrir preenchimento por loja', html:`
      <p class="lead">Escolha quais lojas podem preencher a escala desta semana. Só depois de liberada a loja consegue montar e enviar.</p>
      <div class="toolbar">${weekbar()}<button class="btn pri">Liberar todas as lojas</button></div>
      <div class="card"><table>
        <thead><tr><th>Loja</th><th>Status atual</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    `};
  },
  conferencia(){
    const badge=(s)=>({ok:'<span class="div-ok">✓ Conforme</span>',falta:'<span class="div-bad">✕ Faltou</span>',atraso:'<span class="div-warn">▲ Atraso</span>',extra:'<span class="div-warn">＋ Extra (folga trabalhada)</span>'})[s];
    const rows=DIVERG.map(d=>`<tr>
      <td><div class="t-name">${d.nome}</div><div class="t-mat mono">mat. ${d.mat}</div></td>
      <td>${d.dia}</td><td class="mono">${d.prev}</td><td class="mono">${d.real}</td><td>${badge(d.st)}</td>
    </tr>`).join('');
    return {title:'Conferência — Escala × Ponto', sub:'Semana de 14/07 a 20/07 · comparação com as batidas', html:`
      <p class="lead">Mesmo motor do analisador desktop: sobe o arquivo de batidas, casa por matrícula e compara o previsto na escala com o que foi batido no ponto.</p>
      <div class="form-grid" style="max-width:none;grid-template-columns:1fr 1fr;margin-bottom:20px">
        <div class="field"><label>Loja</label><select><option>WT MORU</option><option>WT MOÇA</option><option>Todas as lojas</option></select></div>
        <div class="field"><label>Semana</label><select><option>14/07 – 20/07</option><option>07/07 – 13/07</option></select></div>
      </div>
      <div class="upload full"><div class="big">⤒</div><b>Solte o arquivo de batidas aqui</b><div style="font-size:12.5px;margin-top:3px">ou clique para selecionar · .csv ou .xlsx</div></div>
      <div class="row between" style="margin:26px 0 12px"><div class="h2">Resultado da conferência</div>
        <div class="row" style="gap:8px">
          <span class="pill p-ok"><span class="d"></span>2 conformes</span>
          <span class="pill p-back"><span class="d"></span>1 falta</span>
          <span class="pill p-draft"><span class="d"></span>2 divergências</span>
        </div>
      </div>
      <div class="card"><table>
        <thead><tr><th>Funcionário</th><th>Dia</th><th>Previsto</th><th>Batido</th><th>Resultado</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
      <div class="row" style="justify-content:flex-end;margin-top:16px"><button class="btn">Exportar divergências (.xlsx)</button></div>
    `};
  },
  funcionarios(){
    const rows=FUNC.map(f=>`<tr>
      <td class="t-name">${f.nome}</td><td class="mono">${f.mat}</td><td class="mono">${f.loja}</td>
      <td style="text-align:right"><button class="btn sm">Editar</button> <button class="btn danger sm">Remover</button></td>
    </tr>`).join('');
    return {title:'Funcionários', sub:'196 funcionários · 41 lojas', html:`
      <p class="lead">Cadastro mestre de funcionários. Só o perfil Conferência adiciona, edita ou remove. O vínculo com a loja usa o código de localização.</p>
      <div class="toolbar">
        <div class="search">🔍 <input placeholder="Buscar por nome, matrícula ou loja…"></div>
        <div class="row" style="gap:10px">
          <button class="btn">⤒ Importar CSV</button>
          <button class="btn pri">+ Novo funcionário</button>
        </div>
      </div>
      <div class="card"><table>
        <thead><tr><th>Nome</th><th>Matrícula</th><th>Loja</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
      <p class="note">Importação lê o CSV no formato <span class="mono">localizacao;matricula;nome</span>. Matrículas duplicadas são atualizadas, novas são criadas — e linhas com localização inválida entram numa lista de pendências pra você revisar.</p>
    `};
  },
  turnos(){
    const rows=TURNOS.map(t=>`<tr>
      <td class="t-name">${t.nome}</td><td class="mono">${t.ent}</td><td class="mono">${t.sai}</td>
      <td class="muted">${t.lojas}</td>
      <td style="text-align:right"><button class="btn sm">Editar</button></td>
    </tr>`).join('');
    const chks=['WT MORU','WT MOÇA','WT CLIM','WT PLSU','T1 CLIM','WT ARIC'].map((c,i)=>`<label class="${i<3?'sel':''}"><input type="checkbox" ${i<3?'checked':''}> ${c}</label>`).join('');
    return {title:'Turnos', sub:'Turnos pré-definidos por loja', html:`
      <p class="lead">Cadastre os turnos que as lojas vão selecionar ao montar a escala, e defina quais lojas enxergam cada um.</p>
      <div class="card card-pad" style="margin-bottom:20px">
        <div class="h2" style="margin-bottom:14px">Novo turno</div>
        <div class="form-grid">
          <div class="field"><label>Nome do turno</label><input placeholder="Ex.: T3 (Shopping)"></div>
          <div class="field"><label>Tipo</label><select><option>Trabalho</option><option>Meio período</option></select></div>
          <div class="field"><label>Entrada</label><input value="10:00"></div>
          <div class="field"><label>Saída</label><input value="22:00"></div>
          <div class="field full"><label>Lojas que verão este turno</label><div class="checks">${chks}</div></div>
        </div>
        <div class="row" style="justify-content:flex-end;margin-top:16px"><button class="btn pri">Salvar turno</button></div>
      </div>
      <div class="card"><table>
        <thead><tr><th>Turno</th><th>Entrada</th><th>Saída</th><th>Lojas</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
      <p class="note">Os status FOLGA, FÉRIAS, ATESTADO e FALTA são fixos do sistema e aparecem pra todas as lojas — não precisam ser cadastrados.</p>
    `};
  }
};

function go(id){screen=id;buildNav();render()}

/* ---------------- EDITOR DE CÉLULA ---------------- */
let editing = null; // {r, d}
function openCell(r, d){
  editing = {r, d, aplicarSemana:false};
  renderModal();
}
function closeCell(){
  editing = null;
  const m = document.getElementById('modal-root');
  if(m) m.innerHTML='';
}
function chooseTurno(nome){
  const t = TURNOS_LOJA.find(x=>x.nome===nome);
  applyCell({t:'turno', turno:t.nome, ent:t.ent, sai:t.sai});
}
function chooseStatus(code){ applyCell({t:code}); }
function chooseCustom(){
  const ent = document.getElementById('c-ent').value || '09:00';
  const sai = document.getElementById('c-sai').value || '18:00';
  applyCell({t:'custom', ent, sai});
}
function applyCell(val){
  const {r, d} = editing;
  if(document.getElementById('wk-all') && document.getElementById('wk-all').checked){
    for(let dd=0; dd<7; dd++) ESCALA[r][dd] = {...val};
  } else {
    ESCALA[r][d] = {...val};
  }
  closeCell();
  render(); // re-desenha a grade com o novo estado
}
function renderModal(){
  let root = document.getElementById('modal-root');
  if(!root){ root=document.createElement('div'); root.id='modal-root'; document.body.appendChild(root); }
  const {r, d} = editing;
  const cur = ESCALA[r][d] || {};
  const func = EQUIPE[r].nome;
  const dia = DIAS[d];
  const turnoOpts = TURNOS_LOJA.map(t=>{
    const sel = (cur.t==='turno' && cur.turno===t.nome) ? ' sel' : '';
    return `<div class="opt${sel}" onclick="chooseTurno('${t.nome}')">
      <span class="on">${t.nome}</span><span class="os mono">${t.ent}–${t.sai}</span></div>`;
  }).join('');
  const cores = {folga:'#8a94a8', ferias:'#1b7fa8', atestado:'#b06f12', falta:'#c93b4b'};
  const statusOpts = STATUS_ESP.map(s=>{
    const sel = (cur.t===s.code) ? ' sel' : '';
    return `<div class="opt st${sel}" onclick="chooseStatus('${s.code}')">
      <span class="on"><span class="dotc" style="background:${cores[s.code]}"></span>${s.rot}</span></div>`;
  }).join('');
  const curEnt = cur.t==='custom' ? cur.ent : '13:00';
  const curSai = cur.t==='custom' ? cur.sai : '22:00';
  root.innerHTML = `
    <div class="ov" onclick="if(event.target===this)closeCell()">
      <div class="modal">
        <div class="mh"><div class="t">${func.split(' ').slice(0,2).join(' ')}</div>
          <div class="s">${dia.d} ${dia.n}/07 · o que fazer neste dia?</div></div>
        <div class="mb">
          <div class="sec">Turnos da loja</div>
          ${turnoOpts}
          <div class="sec" style="margin-top:14px">Status</div>
          ${statusOpts}
          <div class="sec" style="margin-top:14px">Horário personalizado</div>
          <div class="cust">
            <input id="c-ent" type="time" value="${curEnt}">
            <span style="color:var(--slate)">até</span>
            <input id="c-sai" type="time" value="${curSai}">
            <button class="btn pri sm" onclick="chooseCustom()">OK</button>
          </div>
        </div>
        <div class="mf">
          <label class="wkall"><input type="checkbox" id="wk-all"> Aplicar na semana toda</label>
          <button class="btn sm" onclick="closeCell()">Fechar</button>
        </div>
      </div>
    </div>`;
}
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeCell(); });

/* ---------------- INIT ---------------- */
document.querySelectorAll('.role-btn').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.role-btn').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    role=b.dataset.role; screen=DEFAULT[role];
    buildNav(); render();
  };
});
buildNav(); render();
</script>
